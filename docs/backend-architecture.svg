<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 980" role="img" aria-labelledby="backend-arch-title backend-arch-desc">
  <title id="backend-arch-title">Backend Architecture</title>
  <desc id="backend-arch-desc">Layered architecture of the .NET backend with minimal API routes, MediatR handlers, EF Core, SQLite, OpenAI chat, and RAG indexing.</desc>

  <defs>
    <marker id="be-arrow-solid" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1565c0"/>
    </marker>
    <marker id="be-arrow-dashed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5c6bc0"/>
    </marker>
  </defs>

  <rect x="10" y="10" width="960" height="960" rx="10" fill="#ffffff" stroke="#e0e0e0"/>

  <text x="28" y="42" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="600" fill="#333333">Backend Architecture</text>
  <text x="28" y="62" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#777777">.NET 9 | Minimal APIs | MediatR | EF Core | SQLite | OpenAI chat + RAG</text>

  <!-- layer bands -->
  <rect x="24" y="82" width="932" height="96" rx="6" fill="#f7f9fc" stroke="#e8edf5"/>
  <rect x="24" y="198" width="932" height="118" rx="6" fill="#fafafa" stroke="#ececec"/>
  <rect x="24" y="336" width="932" height="360" rx="6" fill="#f7f9fc" stroke="#e8edf5"/>
  <rect x="24" y="716" width="932" height="168" rx="6" fill="#f5f5f5" stroke="#e0e0e0"/>
  <rect x="24" y="904" width="932" height="48" rx="6" fill="#eef2f7" stroke="#d8dee8"/>

  <g font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#888888">
    <text x="34" y="102">HOST</text>
    <text x="34" y="218">HTTP</text>
    <text x="34" y="356">APPLICATION</text>
    <text x="34" y="736">DATA</text>
    <text x="34" y="922">STORAGE</text>
  </g>

  <!-- HOST -->
  <g font-family="Segoe UI, system-ui, sans-serif" fill="#222222" text-anchor="middle">
    <rect x="120" y="98" width="820" height="68" rx="4" fill="#ffffff" stroke="#bdbdbd"/>
    <text x="530" y="122" font-size="13" font-weight="600">Program.cs</text>
    <text x="530" y="142" font-size="11" fill="#555555">EnvFileLoader, AddMediatR, AddChatServices, AddRagServices, AddDbContext</text>
    <text x="530" y="158" font-size="11" fill="#555555">InitAndSeedBackendContest (dev + RAG backfill), Swagger, UseApiRoutes</text>
  </g>

  <!-- HTTP -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#222222" text-anchor="middle">
    <rect x="120" y="214" width="168" height="84" rx="4" fill="#ffffff" stroke="#bdbdbd"/>
    <text x="204" y="240" font-weight="600">RouteRegistrationExtensions</text>
    <text x="204" y="260" font-size="11" fill="#555555">MapGroup(&quot;api&quot;)</text>
    <text x="204" y="278" font-size="11" fill="#555555">mediator.Send(query)</text>

    <rect x="308" y="222" width="118" height="68" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="367" y="248" font-weight="600">Customers</text>
    <text x="367" y="268" font-size="10" fill="#555555">list, detail, docs</text>

    <rect x="440" y="222" width="118" height="68" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="499" y="248" font-weight="600">Suppliers</text>
    <text x="499" y="268" font-size="10" fill="#555555">list, detail, docs</text>

    <rect x="572" y="222" width="118" height="68" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="631" y="248" font-weight="600">Employees</text>
    <text x="631" y="268" font-size="10" fill="#555555">list</text>

    <rect x="704" y="222" width="118" height="68" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="763" y="248" font-weight="600">Chat</text>
    <text x="763" y="268" font-size="10" fill="#555555">status, chat, tools</text>

    <rect x="836" y="222" width="88" height="68" rx="4" fill="#ffffff" stroke="#bdbdbd"/>
    <text x="880" y="248" font-weight="600">Swagger</text>
    <text x="880" y="268" font-size="10" fill="#555555">/swagger</text>
  </g>

  <!-- APPLICATION -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#222222" text-anchor="middle">
    <rect x="120" y="352" width="118" height="64" rx="4" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
    <text x="179" y="378" font-weight="600">IMediator</text>
    <text x="179" y="398" font-size="10" fill="#555555">CQRS handlers</text>

    <rect x="120" y="430" width="118" height="96" rx="4" fill="#fffdf5" stroke="#bdbdbd"/>
    <text x="130" y="454" text-anchor="start" font-weight="600">Shared</text>
    <text x="130" y="474" text-anchor="start" font-size="10" fill="#555555">ListPagination</text>
    <text x="130" y="494" text-anchor="start" font-size="10" fill="#555555">SearchQueryLimits</text>
    <text x="130" y="514" text-anchor="start" font-size="10" fill="#555555">EnvFileLoader</text>

    <rect x="260" y="352" width="142" height="174" rx="4" fill="#ffffff" stroke="#bdbdbd"/>
    <text x="331" y="376" font-weight="600">Features/Customers</text>
    <text x="331" y="398" font-size="10" fill="#555555">CustomersListQuery</text>
    <text x="331" y="418" font-size="10" fill="#555555">CustomerDetailQuery</text>
    <text x="331" y="438" font-size="10" fill="#555555">document queries</text>
    <text x="331" y="458" font-size="10" fill="#555555">upload -&gt; indexer</text>
    <text x="331" y="488" font-size="10" fill="#888888">to BackendContext</text>

    <rect x="416" y="352" width="142" height="174" rx="4" fill="#ffffff" stroke="#bdbdbd"/>
    <text x="487" y="376" font-weight="600">Features/Suppliers</text>
    <text x="487" y="398" font-size="10" fill="#555555">SupplierListQuery</text>
    <text x="487" y="418" font-size="10" fill="#555555">SupplierDetailQuery</text>
    <text x="487" y="438" font-size="10" fill="#555555">document queries</text>
    <text x="487" y="458" font-size="10" fill="#555555">upload -&gt; indexer</text>
    <text x="487" y="488" font-size="10" fill="#888888">to BackendContext</text>

    <rect x="572" y="352" width="142" height="174" rx="4" fill="#ffffff" stroke="#bdbdbd"/>
    <text x="643" y="376" font-weight="600">Features/Employees</text>
    <text x="643" y="398" font-size="10" fill="#555555">EmployeesListQuery</text>
    <text x="643" y="422" font-size="10" fill="#555555">pagination + search</text>
    <text x="643" y="488" font-size="10" fill="#888888">to BackendContext</text>

    <rect x="728" y="352" width="142" height="174" rx="4" fill="#ffffff" stroke="#bdbdbd"/>
    <text x="799" y="376" font-weight="600">Features/Chat</text>
    <text x="799" y="398" font-size="10" fill="#555555">ChatQueryHandler</text>
    <text x="799" y="418" font-size="10" fill="#555555">ChatSessionStore</text>
    <text x="799" y="438" font-size="10" fill="#555555">OpenAiChatClient</text>
    <text x="799" y="458" font-size="10" fill="#555555">ChatToolExecutor</text>
    <text x="799" y="478" font-size="10" fill="#555555">ChatDataTools</text>
    <text x="799" y="498" font-size="10" fill="#555555">ChatDocumentTools</text>

    <rect x="260" y="544" width="298" height="52" rx="4" fill="#fffdf5" stroke="#bdbdbd" stroke-dasharray="4 3"/>
    <text x="409" y="566" font-weight="600">Features/Documents</text>
    <text x="409" y="586" font-size="10" fill="#555555">shared upload/download helpers</text>

    <rect x="572" y="544" width="298" height="124" rx="4" fill="#e8f5e9" stroke="#81c784"/>
    <text x="721" y="568" font-weight="600">Features/Rag</text>
    <text x="721" y="590" font-size="10" fill="#555555">DocumentChunker</text>
    <text x="721" y="610" font-size="10" fill="#555555">OpenAiEmbeddingClient</text>
    <text x="721" y="630" font-size="10" fill="#555555">DocumentIndexer</text>
    <text x="721" y="650" font-size="10" fill="#555555">DocumentChunkSearch (cosine top-k)</text>

    <rect x="884" y="388" width="96" height="84" rx="4" fill="#ffffff" stroke="#5c6bc0" stroke-dasharray="6 4"/>
    <text x="932" y="414" font-weight="600">OpenAI API</text>
    <text x="932" y="434" font-size="10" fill="#555555">chat/completions</text>
    <text x="932" y="454" font-size="10" fill="#555555">embeddings</text>
  </g>

  <!-- DATA -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#222222" text-anchor="middle">
    <rect x="260" y="732" width="720" height="56" rx="4" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
    <text x="620" y="756" font-weight="600">BackendContext (EF Core DbContext)</text>
    <text x="620" y="776" font-size="11" fill="#555555">DbSet + entity configurations + Seed()</text>

    <rect x="260" y="804" width="88" height="38" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="304" y="828">Customer</text>

    <rect x="356" y="804" width="108" height="38" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="410" y="828" font-size="11">CustomerCategory</text>

    <rect x="472" y="804" width="78" height="38" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="511" y="828">Supplier</text>

    <rect x="558" y="804" width="78" height="38" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="597" y="828">Employee</text>

    <rect x="644" y="804" width="88" height="38" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="688" y="828">Department</text>

    <rect x="740" y="804" width="88" height="38" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="784" y="828">Document</text>

    <rect x="836" y="804" width="120" height="38" rx="4" fill="#e8f5e9" stroke="#81c784"/>
    <text x="896" y="828">DocumentChunk</text>
  </g>

  <!-- STORAGE -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#222222" text-anchor="middle">
    <rect x="260" y="914" width="720" height="28" rx="4" fill="#ffffff" stroke="#bdbdbd"/>
    <text x="620" y="933" font-weight="600">SQLite - backend.db (Documents + DocumentChunks)</text>
  </g>

  <!-- arrows -->
  <g stroke="#1565c0" stroke-width="1.5" fill="none">
    <line x1="530" y1="166" x2="530" y2="198" marker-end="url(#be-arrow-solid)"/>
    <line x1="530" y1="316" x2="530" y2="336" marker-end="url(#be-arrow-solid)"/>
    <line x1="620" y1="696" x2="620" y2="716" marker-end="url(#be-arrow-solid)"/>
    <line x1="620" y1="884" x2="620" y2="904" marker-end="url(#be-arrow-solid)"/>

    <line x1="204" y1="298" x2="179" y2="336" marker-end="url(#be-arrow-solid)"/>

    <line x1="367" y1="290" x2="331" y2="336" marker-end="url(#be-arrow-solid)"/>
    <line x1="499" y1="290" x2="487" y2="336" marker-end="url(#be-arrow-solid)"/>
    <line x1="631" y1="290" x2="643" y2="336" marker-end="url(#be-arrow-solid)"/>
    <line x1="763" y1="290" x2="799" y2="336" marker-end="url(#be-arrow-solid)"/>

    <line x1="331" y1="526" x2="331" y2="716" marker-end="url(#be-arrow-solid)"/>
    <line x1="487" y1="526" x2="487" y2="716" marker-end="url(#be-arrow-solid)"/>
    <line x1="643" y1="526" x2="643" y2="716" marker-end="url(#be-arrow-solid)"/>
    <line x1="799" y1="526" x2="799" y2="716" marker-end="url(#be-arrow-solid)"/>
    <line x1="721" y1="668" x2="721" y2="716" marker-end="url(#be-arrow-solid)"/>
  </g>

  <g stroke="#5c6bc0" stroke-width="1.5" stroke-dasharray="6 4" fill="none">
    <line x1="870" y1="440" x2="884" y2="420" marker-end="url(#be-arrow-dashed)"/>
    <line x1="870" y1="620" x2="884" y2="460" marker-end="url(#be-arrow-dashed)"/>
    <line x1="331" y1="544" x2="331" y2="526" marker-end="url(#be-arrow-dashed)"/>
    <line x1="487" y1="544" x2="487" y2="526" marker-end="url(#be-arrow-dashed)"/>
    <line x1="409" y1="544" x2="640" y2="544" marker-end="url(#be-arrow-dashed)"/>
  </g>

  <!-- labels -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#555555">
    <text x="542" y="190">UseApiRoutes()</text>
    <text x="542" y="330">Send()</text>
    <text x="632" y="710">EF queries</text>
    <text x="632" y="898">persist</text>
    <text x="876" y="432">tool calling</text>
    <text x="860" y="540">embeddings</text>
    <text x="300" y="538">helpers</text>
    <text x="620" y="538">index on upload</text>
  </g>
</svg>
