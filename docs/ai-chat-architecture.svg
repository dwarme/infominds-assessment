<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 500" role="img" aria-labelledby="ai-chat-arch-title ai-chat-arch-desc">
  <title id="ai-chat-arch-title">AI Chat Architecture</title>
  <desc id="ai-chat-arch-desc">Sequence diagram of the chat flow between ChatWidget, POST /api/chat, ChatSessionStore, OpenAI API, ChatDataTools, and SQLite.</desc>

  <defs>
    <marker id="arrow-solid" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1565c0"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5c6bc0"/>
    </marker>
  </defs>

  <rect x="10" y="10" width="960" height="480" rx="10" fill="#ffffff" stroke="#e0e0e0"/>

  <text x="28" y="40" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="600" fill="#333333">Architecture</text>

  <g font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#222222" text-anchor="middle">
    <rect x="24" y="58" width="108" height="34" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="78" y="80">ChatWidget</text>

    <rect x="158" y="58" width="132" height="34" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="224" y="80">POST /api/chat</text>

    <rect x="316" y="58" width="132" height="34" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="382" y="80">ChatSessionStore</text>

    <rect x="474" y="58" width="108" height="34" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="528" y="80">OpenAI API</text>

    <rect x="608" y="58" width="118" height="34" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="667" y="80">ChatDataTools</text>

    <rect x="752" y="58" width="88" height="34" rx="4" fill="#f5f5f5" stroke="#bdbdbd"/>
    <text x="796" y="80">SQLite</text>
  </g>

  <g stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="5 5">
    <line x1="78" y1="92" x2="78" y2="460"/>
    <line x1="224" y1="92" x2="224" y2="460"/>
    <line x1="382" y1="92" x2="382" y2="460"/>
    <line x1="528" y1="92" x2="528" y2="460"/>
    <line x1="667" y1="92" x2="667" y2="460"/>
    <line x1="796" y1="92" x2="796" y2="460"/>
  </g>

  <g font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#555555">
    <line x1="78" y1="118" x2="224" y2="118" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
    <text x="151" y="110" text-anchor="middle">conversationId + message</text>

    <line x1="224" y1="148" x2="382" y2="148" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
    <text x="303" y="140" text-anchor="middle">load messages[]</text>

    <line x1="224" y1="178" x2="528" y2="178" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
    <text x="376" y="170" text-anchor="middle">system + history + tools schema</text>

    <line x1="528" y1="208" x2="224" y2="208" stroke="#5c6bc0" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-dashed)"/>
    <text x="376" y="200" text-anchor="middle">tool_calls</text>

    <line x1="224" y1="238" x2="667" y2="238" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
    <text x="446" y="230" text-anchor="middle">execute(count_customers_by_category, ...)</text>

    <line x1="667" y1="268" x2="796" y2="268" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
    <text x="732" y="260" text-anchor="middle">EF query</text>

    <line x1="796" y1="298" x2="667" y2="298" stroke="#5c6bc0" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-dashed)"/>
    <text x="732" y="290" text-anchor="middle">JSON result</text>

    <line x1="224" y1="328" x2="528" y2="328" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
    <text x="376" y="320" text-anchor="middle">tool results</text>

    <line x1="528" y1="358" x2="224" y2="358" stroke="#5c6bc0" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-dashed)"/>
    <text x="376" y="350" text-anchor="middle">assistant reply</text>

    <line x1="224" y1="388" x2="382" y2="388" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
    <text x="303" y="380" text-anchor="middle">save user + assistant</text>

    <line x1="224" y1="418" x2="78" y2="418" stroke="#5c6bc0" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-dashed)"/>
    <text x="151" y="410" text-anchor="middle">conversationId + reply</text>
  </g>
</svg>
